<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Battle East vs West</title>

  <!-- CSS intégré -->
  <style>
    /* GLOBAL */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #111;
      color: white;
      position: relative;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #000;
      padding: 20px;
    }

    .sidebar h2 {
      color: #aaa;
    }

    .artist-name {
      background: #222;
      padding: 10px;
      margin: 10px 0;
      text-align: center;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.2s;
    }

    .artist-name:hover {
      background: #555;
      transform: scale(1.05);
    }

    /* CENTRE */
    .middle {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      position: relative;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      text-shadow: 2px 2px 5px black;
      transition: 0.3s;
    }

    /* DESCRIPTION AU HOVER */
    .middle::after {
      content: attr(data-desc);
      position: absolute;
      bottom: 20px;
      background: rgba(0,0,0,0.8);
      padding: 8px;
      border-radius: 5px;
      opacity: 0;
      transition: 0.3s;
    }

    .middle:hover::after {
      opacity: 1;
    }

    /* CONTROLES AUDIO */
    .controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
    }

    .controls button {
      padding: 10px;
      cursor: pointer;
    }

    /* RESPONSIVE */
    @media (max-width: 800px) {
      .sidebar {
        width: 150px;
      }
      .middle {
        font-size: 25px;
      }
    }
  </style>
</head>
<body>

  <!-- AUDIO -->
  <audio id="player"></audio>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>West Coast</h2>
    <div class="artist-name" onclick="changeArtist('Dr Dre','Légende West Coast','media/drdre.png','media/drdre.mp3')">Dr Dre</div>
    <div class="artist-name" onclick="changeArtist('Snoop Dogg','Icône West Coast','media/snoop.png','media/snoop.mp3')">Snoop Dogg</div>

    <h2>East Coast</h2>
    <div class="artist-name" onclick="changeArtist('Biggie','Icône East Coast','media/biggie.png','media/biggie.mp3')">Biggie</div>
    <div class="artist-name" onclick="changeArtist('Nas','Légende East Coast','media/nas.png','media/nas.mp3')">Nas</div>
  </div>

  <!-- CENTRE -->
  <div class="middle" id="middle-name" data-desc="Clique sur un artiste">
    CHOISIS UN ARTISTE
  </div>

  <!-- CONTROLES AUDIO -->
  <div class="controls">
    <button onclick="togglePlay()">⏯ Play / Pause</button>
  </div>

  <!-- JAVASCRIPT intégré -->
  <script>
    let currentAudio = document.getElementById("player");

    function changeArtist(name, desc, img, audio) {
      const middle = document.getElementById('middle-name');

      // TEXTE
      middle.innerText = name;

      // DESCRIPTION
      middle.setAttribute('data-desc', desc);

      // IMAGE DE FOND
      middle.style.backgroundImage = `url('${img}')`;

      // COULEUR
      if (desc.toLowerCase().includes('west')) {
        middle.style.color = "#00ff00";
      } else {
        middle.style.color = "#ff0000";
      }

      // JOUER AUDIO
      currentAudio.src = audio;
      currentAudio.play();

      // ANIMATION
      middle.style.transform = "scale(1.1)";
      setTimeout(() => { middle.style.transform = "scale(1)"; }, 200);
    }

    function togglePlay() {
      if (currentAudio.paused) {
        currentAudio.play();
      } else {
        currentAudio.pause();
      }
    }
  </script>
</body>
</html>
