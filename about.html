<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Battle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- AUDIO PLAYER -->
  <audio id="player"></audio>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>West Coast</h2>
    <div class="artist-name" onclick="changeArtist('Dr Dre','Légende West Coast','media/drdre.png','media/drdre.mp3')">Dr Dre</div>
    <div class="artist-name" onclick="changeArtist('Snoop Dogg','Icône West Coast','media/snoop.png','media/snoop.mp3')">Snoop Dogg</div>

    <h2>East Coast</h2>
    <div class="artist-name" onclick="changeArtist('Biggie','Icône East Coast','media/biggie.png','media/biggie.mp3')">Biggie</div>
    <div class="artist-name" onclick="changeArtist('Nas','Légende East Coast','media/nas.png','media/nas.mp3')">Nas</div>
  </div>

  <!-- CENTRE -->
  <div class="middle" id="middle-name" data-desc="Clique sur un artiste">
    CHOISIS UN ARTISTE
  </div>

  <!-- CONTROLES -->
  <div class="controls">
    <button onclick="togglePlay()">⏯ Play / Pause</button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
