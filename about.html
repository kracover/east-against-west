<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>East vs West</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sidebar des rappeurs -->
  <div class="sidebar">
    <h2>West Coast</h2>
    <div class="artist-name" onclick="changeMiddleWithDesc('Dr Dre', 'Légende du West Coast')">Dr Dre</div>
    <div class="artist-name" onclick="changeMiddleWithDesc('Snoop Dogg', 'Icône West Coast')">Snoop Dogg</div>

    <h2>East Coast</h2>
    <div class="artist-name" onclick="changeMiddleWithDesc('Biggie', 'Icône East Coast')">Biggie</div>
    <div class="artist-name" onclick="changeMiddleWithDesc('Nas', 'Légende East Coast')">Nas</div>
  </div>

  <!-- Zone du milieu -->
  <div class="middle" id="middle-name" data-desc="Légende du West Coast">
    Dr Dre
  </div>
<script>
function changeMiddleWithDesc(name, desc) {
  const middleDiv = document.getElementById('middle-name');
  middleDiv.innerText = name;
  middleDiv.setAttribute('data-desc', desc);

  if (desc.toLowerCase().includes('west')) {
    middleDiv.style.color = '#00ff00';
  } else if (desc.toLowerCase().includes('east')) {
    middleDiv.style.color = '#ff0000';
  } else {
    middleDiv.style.color = '#fff';
  }
}
</script>
  <script src="js/script.js"></script>
</body>
</html>
