<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rap US</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="rap">

    <!-- 🎤 AFFICHAGE -->
    <div class="display">

        <div class="artist-content dre">
            <div class="card dre"></div>
            <h1>DR DRE</h1>
            <p>Figure majeure du West Coast, producteur légendaire.</p>
        </div>

        <div class="artist-content snoop">
            <div class="card snoop"></div>
            <h1>SNOOP DOGG</h1>
            <p>Style laid-back iconique du rap West Coast.</p>
        </div>

        <div class="artist-content biggie active">
            <div class="card biggie"></div>
            <h1>NOTORIOUS B.I.G</h1>
            <p>Légende du East Coast avec un flow unique.</p>
        </div>

        <div class="artist-content nas">
            <div class="card nas"></div>
            <h1>NAS</h1>
            <p>Rappeur new-yorkais connu pour ses lyrics profonds.</p>
        </div>

    </div>

    <!-- 🎧 MENU -->
    <div class="menu">
        <div class="item dre">Dr Dre (West)</div>
        <div class="item snoop">Snoop Dogg (West)</div>
        <div class="item biggie">Biggie (East)</div>
        <div class="item nas">Nas (East)</div>
    </div>

</div>

</body>
</html>
