<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>East vs West</title>

  <!-- CSS intégré -->
  <style>
    /* GLOBAL */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('media/background.jpg') center/cover no-repeat;
      color: white;
      position: relative;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* ratio 16:9 */
      padding-top: 25px;
      height: 0;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* CARTES */
    .card {
      background: #222;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      overflow: hidden;
      width: 500px;
      height: 900px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      height: 400px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
    }

    .card-content h2 {
      margin: 0;
      font-size: 18px;
    }

    .card-content p {
      font-size: 14px;
      color: #aaa;
    }

    /* CARTE CENTRALE */
    .main-card {
      width: 400px;
      background: #333;
    }

    .main-card img {
      height: 250px;
    }

    .main-card button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .main-card button:hover {
      background: lime;
      color: black;
    }

    /* OVERLAY sombre pour contraste */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      top: 0;
      left: 0;
      z-index: 1;
    }

    .home-container {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 20px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px red; }
      to { text-shadow: 0 0 20px lime; }
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 30px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: lime;
      transform: scale(1.05);
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      h1 {
        font-size: 40px;
      }
      p {
        font-size: 16px;
      }
      .btn {
        padding: 12px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  
  <!-- Carte gauche (West Coast) -->
  <div class="card">
    <img src="media/west.jfif" alt="West">
    <div class="card-content">
      <h2>West Coast</h2>
      <div class="video-container">
  <iframe width="560" height="315" 
          src="https://www.youtube.com/embed/-7WRgLNNEO0" 
          title="YouTube video player" 
          frameborder="0" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
          allowfullscreen>
  </iframe>
</div>
      <p>Description ou texte ici</p>
      <button> Découvrir </button>
    </div>
  </div>

  <div class="home-container">
    <h1>East Coast vs West Coast</h1>
    <p>Plonge dans l’univers du
       <a href=https://www.canva.com/design/DAHEvSX1VmU/fgSewWGHgb8Rw53tkpt_8g/view?embed>
         rap américain 🔥
       </a>
    </p>
    <a href="about.html" class="btn">ENTRER DANS LA BATTLE</a>
  </div>

    <!-- Carte droite (East Coast) -->
  <div class="card">
    <img src="media/east.jfif" alt="East">
    <div class="card-content">
      <h2>East Coast</h2>
      <div class="video-container">
  <iframe width="560" height="315" 
          src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
          title="YouTube video player" 
          frameborder="0" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
          allowfullscreen>
  </iframe>
</div>
      <p>Description ou texte ici</p>
      <button> Découvrir </button>
    </div>
  </div>
  
</body>
</html>
