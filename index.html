  <style>
    body {
      margin: 0;

    .container {

      align-items: center;
      height: 100vh;
      gap: 20px;
    }

    .banderole {
    position: fixed;

    left: 0;
    }

      background: white;

      width: 250px;
    }

    .card img {

      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h2 {
      margin: 0;
      font-size: 20px;
    }

    .card-content p {
      font-size: 14px;
      color: #555;
    }

    .main {
      width: 500px;
    }

    .main img {
      height: 250px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>

<div class="container">
