<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>East vs West</title>

  <!-- CSS intégré -->
  <style>
    /* GLOBAL */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('media/background.jpg') center/cover no-repeat;
      color: white;
      position: relative;
    }

    /* OVERLAY sombre pour contraste */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      top: 0;
      left: 0;
      z-index: 1;
    }

    .home-container {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 20px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px red; }
      to { text-shadow: 0 0 20px lime; }
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 30px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: lime;
      transform: scale(1.05);
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      h1 {
        font-size: 40px;
      }
      p {
        font-size: 16px;
      }
      .btn {
        padding: 12px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="home-container">
    <h1>East Coast vs West Coast</h1>
    <p>Plonge dans l’univers du rap américain 🔥</p>
    <a href="about.html" class="btn">ENTRER DANS LA BATTLE</a>
  </div>

</body>
</html>
